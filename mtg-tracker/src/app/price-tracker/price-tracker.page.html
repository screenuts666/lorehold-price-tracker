<ion-header [translucent]="true">
  <ion-toolbar class="glass-item">
    <ion-title>
      <span class="gradient-title">Lorehold Price Tracker</span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="aggiornaTuttiIPrezzi(true)" color="primary" class="neon-btn">
        <ion-icon slot="icon-only" name="refresh"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar class="glass-item" style="--padding-top: 4px; --padding-bottom: 4px;">
    <ion-segment [(ngModel)]="sezioneAttiva" (ionChange)="onSezioneChange()" style="background: rgba(30, 41, 59, 0.35); border-radius: 10px; margin: 0 auto; max-width: 500px;">
      <ion-segment-button value="acquisto" style="--indicator-color: #a78bfa;">
        <span style="font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; color: #f8fafc; padding: 6px 0;">
          <ion-icon name="cart-outline" style="font-size: 16px;"></ion-icon>
          ACQUISTI ({{ prodottiAcquisto.length }})
        </span>
      </ion-segment-button>
      <ion-segment-button value="vendita" style="--indicator-color: #f472b6;">
        <span style="font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; color: #f8fafc; padding: 6px 0;">
          <ion-icon name="cash-outline" style="font-size: 16px;"></ion-icon>
          VENDITE ({{ prodottiVendita.length }})
        </span>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- LOADER -->
  <div *ngIf="caricamento" class="ion-text-center ion-padding" style="margin: 20px 0;">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p style="color: #94a3b8; font-weight: 500; margin-top: 10px;">Sincronizzazione prezzi in corso...</p>
  </div>

  <!-- BARRA CONTROLLI (VISTA & ORDINAMENTO) -->
  <div *ngIf="prodotti.length > 0 && !caricamento" style="display: flex; justify-content: space-between; align-items: center; margin: 16px 12px; gap: 16px; flex-wrap: wrap;">
    <div style="display: flex; gap: 12px; align-items: center;">
      <!-- TOGGLE VISTA -->
      <ion-segment [(ngModel)]="vista" (ionChange)="onVistaChange()" style="width: auto; max-width: 100px; background: rgba(30, 41, 59, 0.3); border-radius: 10px; height: 38px;">
        <ion-segment-button value="grid" style="--indicator-color: #8b5cf6;">
          <ion-icon name="apps-outline" style="font-size: 16px;"></ion-icon>
        </ion-segment-button>
        <ion-segment-button value="table" style="--indicator-color: #8b5cf6;">
          <ion-icon name="list-outline" style="font-size: 16px;"></ion-icon>
        </ion-segment-button>
      </ion-segment>

      <!-- TOGGLE COLONNE GRID (SOLO SE IN GRIGLIA) -->
      <ion-segment 
        *ngIf="vista === 'grid'" 
        [(ngModel)]="colonneGrid" 
        (ionChange)="onColonneGridChange()" 
        style="width: auto; max-width: 100px; background: rgba(30, 41, 59, 0.3); border-radius: 10px; height: 38px;"
      >
        <ion-segment-button [value]="3" style="--indicator-color: #8b5cf6;" title="Visualizzazione a 3 colonne">
          <ion-icon name="grid-outline" style="font-size: 16px;"></ion-icon>
        </ion-segment-button>
        <ion-segment-button [value]="4" style="--indicator-color: #8b5cf6;" title="Visualizzazione a 4 colonne">
          <ion-icon name="apps-outline" style="font-size: 16px;"></ion-icon>
        </ion-segment-button>
      </ion-segment>
    </div>

    <!-- ORDINAMENTO -->
    <div style="display: flex; align-items: center; gap: 8px; background: rgba(30, 41, 59, 0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 0 12px; height: 38px;">
      <span style="font-size: 0.75rem; color: #94a3b8; font-weight: 600;">Ordina per:</span>
      <ion-select 
        interface="popover" 
        [(ngModel)]="ordinamento" 
        (ionChange)="onOrdinamentoChange()"
        style="--placeholder-color: #f8fafc; font-size: 0.85rem; font-weight: 700; color: #f8fafc; --padding-start: 4px; --padding-end: 4px;"
      >
        <ion-select-option value="recente">Più recente</ion-select-option>
        <ion-select-option value="nome">Nome (A-Z)</ion-select-option>
        <ion-select-option value="prezzo-crescente">Valore: Crescente</ion-select-option>
        <ion-select-option value="prezzo-decrescente">Valore: Decrescente</ion-select-option>
        <ion-select-option value="variazione-peggiore">Miglior incremento (Guadagno)</ion-select-option>
        <ion-select-option value="variazione-migliore">Maggior calo (Perdita)</ion-select-option>
      </ion-select>
    </div>
  </div>

  <!-- AREA ACQUISTI (COMPRA) -->
  <app-acquisto-sezione 
    *ngIf="sezioneAttiva === 'acquisto' && !caricamento" 
    [prodotti]="prodottiAcquisto" 
    [vista]="vista"
    [colonneGrid]="colonneGrid"
    (onAdd)="aggiungiProdotto('compra', $event)"
    (onRemove)="rimuoviProdotto($event)"
  ></app-acquisto-sezione>

  <!-- AREA VENDITE (VENDI) -->
  <app-vendita-sezione 
    *ngIf="sezioneAttiva === 'vendita' && !caricamento" 
    [prodotti]="prodottiVendita" 
    [vista]="vista"
    [colonneGrid]="colonneGrid"
    (onAdd)="aggiungiProdotto('vendi', $event)"
    (onRemove)="rimuoviProdotto($event)"
  ></app-vendita-sezione>
</ion-content>
