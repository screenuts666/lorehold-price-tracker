<div style="margin: 10px 12px 20px 12px;">
  <!-- SEARCH BAR -->
  <div style="display: flex; gap: 12px; align-items: center; background: rgba(30, 41, 59, 0.25); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 4px 12px;">
    <ion-icon name="search-outline" style="color: #a78bfa; font-size: 20px;"></ion-icon>
    <input 
      type="text" 
      [(ngModel)]="searchQuery" 
      (keyup.enter)="search()" 
      placeholder="Search card by English or Italian name (e.g. Bloom Tender)..." 
      style="flex-grow: 1; background: transparent; border: none; padding: 10px 0; color: #f8fafc; font-size: 0.85rem; font-weight: 600; outline: none;"
    />
    <ion-button (click)="search()" color="primary" size="small" class="neon-btn" style="margin: 0; font-weight: 700; height: 32px;">
      Search
    </ion-button>
  </div>
</div>

<!-- RESULTS CONTAINER -->
<div class="glass-card" style="margin: 12px; padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.07); background: rgba(30, 41, 59, 0.35); min-height: 250px;">
  <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">
    <ion-icon name="sparkles-outline" style="color: #a78bfa; font-size: 22px;"></ion-icon>
    <h2 style="margin: 0; font-size: 1.15rem; font-weight: 800; color: #f8fafc; letter-spacing: 0.5px;">Search Results</h2>
  </div>

  <div *ngIf="searching" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px;">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p style="color: #94a3b8; font-size: 0.85rem; margin-top: 10px; font-weight: 600;">Searching Scryfall and mapping editions...</p>
  </div>

  <div *ngIf="!searching && searchResults.length === 0" style="display: flex; align-items: center; justify-content: center; height: 200px; color: #64748b; font-size: 0.85rem; font-style: italic;">
    Type a card name above and click Search.
  </div>

  <div *ngIf="!searching && searchResults.length > 0" style="display: flex; flex-direction: column; gap: 10px;">
    <div *ngFor="let card of searchResults" (click)="selectPrint(card)" class="table-row-hover" style="display: flex; gap: 16px; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.03); background: rgba(30, 41, 59, 0.25); cursor: pointer; align-items: center; transition: all 0.25s;">
      <!-- IMAGE PREVIEW -->
      <img *ngIf="card.image" [src]="card.image" style="width: 44px; height: 60px; object-fit: contain; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.4);" />
      <div *ngIf="!card.image" style="width: 44px; height: 60px; background: rgba(0,0,0,0.15); border-radius: 4px; display: flex; align-items: center; justify-content: center; border: 1px dashed rgba(255,255,255,0.08);">
        <ion-icon name="image" style="color: #475569; font-size: 16px;"></ion-icon>
      </div>

      <!-- CARD DETAILS -->
      <div style="flex-grow: 1; min-width: 0;">
        <span style="font-size: 0.95rem; font-weight: 700; color: #f8fafc; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
          {{ card.printed_name }}
        </span>
        <span style="font-size: 0.72rem; color: #a78bfa; font-weight: 600; display: block; margin-top: 2px;">
          {{ card.set_name }} ({{ card.set_code | uppercase }}) • #{{ card.collector_number }}
        </span>
        <span *ngIf="card.name !== card.printed_name" style="font-size: 0.7rem; color: #64748b; font-style: italic; display: block; margin-top: 1px;">
          {{ card.name }}
        </span>
      </div>
    </div>
  </div>
</div>
